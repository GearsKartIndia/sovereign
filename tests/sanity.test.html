<script>
/* ════════════════════════════════════════════════════════════════
   MINI TEST RUNNER
════════════════════════════════════════════════════════════════ */
const suites  = [];
let _suite    = null;

function describe(name, fn) {
  _suite = { name, tests: [] };
  suites.push(_suite);
  fn();
  _suite = null;
}

function it(name, fn) {
  if (!_suite) throw new Error('it() called outside describe()');
  _suite.tests.push({ name, fn });
}

function assertEqual(a, b, msg) {
  if (a !== b) throw new Error(msg || `Expected ${JSON.stringify(a)} === ${JSON.stringify(b)}`);
}
function assertDeepEqual(a, b, msg) {
  if (JSON.stringify(a) !== JSON.stringify(b))
    throw new Error(msg || `Deep-equal failed:\n  got:      ${JSON.stringify(a)}\n  expected: ${JSON.stringify(b)}`);
}
function assertOk(v, msg)    { if (!v) throw new Error(msg || `Expected truthy, got ${v}`); }
function assertFalsy(v, msg) { if (v)  throw new Error(msg || `Expected falsy, got ${v}`); }
function assertThrows(fn, msg) {
  try { fn(); throw new Error('No error thrown'); }
  catch(e) { if (e.message === 'No error thrown') throw new Error(msg || e.message); }
}
async function assertRejects(fn, msg) {
  try { await fn(); throw new Error('No rejection'); }
  catch(e) { if (e.message === 'No rejection') throw new Error(msg || 'Expected rejection'); }
}
function assertIncludes(str, sub, msg) {
  if (!str.includes(sub)) throw new Error(msg || `"${sub}" not found in "${str}"`);
}

/* ════════════════════════════════════════════════════════════════
   APP CODE — copied verbatim from web/index.html
   (keep in sync when the source changes)
════════════════════════════════════════════════════════════════ */
// Reduced for test speed — functional correctness is iteration-count-independent.
// Real 310,000-iteration strength is verified in crypto.test.mjs.
const PBKDF2_ITER = 1000;
const SALT_KEY    = 'vault_salt';
const VAULT_KEY   = 'vault_data';
const BIO_KEY     = 'vault_bio_cred';

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const raw = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations: PBKDF2_ITER, hash:'SHA-256' },
    raw, { name:'AES-GCM', length:256 }, true, ['encrypt','decrypt']
  );
}

async function encrypt(data, key) {
  const iv  = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const ct  = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(JSON.stringify(data)));
  const out = new Uint8Array(12 + ct.byteLength);
  out.set(iv);
  out.set(new Uint8Array(ct), 12);
  let s = '';
  for (let i = 0; i < out.length; i++) s += String.fromCharCode(out[i]);
  return btoa(s);
}

async function decrypt(b64, key) {
  const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const iv  = raw.slice(0, 12);
  const ct  = raw.slice(12);
  const pt  = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
  return JSON.parse(new TextDecoder().decode(pt));
}

function getSalt() {
  let s = localStorage.getItem(SALT_KEY);
  if (!s) {
    const arr = crypto.getRandomValues(new Uint8Array(32));
    s = btoa(String.fromCharCode(...arr));
    localStorage.setItem(SALT_KEY, s);
  }
  return Uint8Array.from(atob(s), c => c.charCodeAt(0));
}

let _key     = null;
let _entries = [];
let _editId  = null;
let _revealed = new Set();

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function setupVault() {
  const pw  = document.getElementById('setup-pw').value;
  const pw2 = document.getElementById('setup-pw2').value;
  if (pw.length < 10) { toast('Password must be at least 10 characters', true); return; }
  if (pw !== pw2)     { toast('Passwords do not match', true); return; }
  const salt = getSalt();
  _key       = await deriveKey(pw, salt);
  _entries   = [];
  await saveVault();
  show('screen-app');
  renderEntries();
  toast('Sovereign vault created ✓');
}

async function unlock() {
  const pw = document.getElementById('lock-pw').value;
  if (!pw) { toast('Enter your master password', true); return; }
  try {
    const salt = getSalt();
    const key  = await deriveKey(pw, salt);
    const blob = localStorage.getItem(VAULT_KEY);
    const data = await decrypt(blob, key);
    _key     = key;
    _entries = data.entries || [];
    document.getElementById('lock-pw').value = '';
    show('screen-app');
    renderEntries();
    toast('Unlocked ✓');
  } catch {
    toast('Wrong password', true);
  }
}

async function saveVault() {
  if (!_key) return;
  const blob = await encrypt({ entries: _entries }, _key);
  localStorage.setItem(VAULT_KEY, blob);
  await cacheKeyInSession(_key);
}

async function cacheKeyInSession(key) {
  const raw = await crypto.subtle.exportKey('raw', key);
  sessionStorage.setItem('vk', btoa(String.fromCharCode(...new Uint8Array(raw))));
}

function lockApp() {
  _key = null; _entries = [];
  sessionStorage.removeItem('vk');
  show('screen-lock');
  document.getElementById('lock-pw').value = '';
}

function renderEntries() {
  const q    = (document.getElementById('search-input')?.value || '').toLowerCase();
  const list = document.getElementById('entry-list');
  const filtered = _entries.filter(e => e.name.toLowerCase().includes(q));
  document.getElementById('entries-count').textContent =
    filtered.length + ' entr' + (filtered.length === 1 ? 'y' : 'ies');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state">${_entries.length ? 'No matches' : 'No entries yet'}</div>`;
    return;
  }
  list.innerHTML = filtered.map(e => {
    const isRevealed = _revealed.has(e.id);
    return `<div class="entry-card" data-id="${e.id}">
      <span class="entry-name">${esc(e.name)}</span>
      <div class="entry-value${isRevealed?'':' masked'}">${esc(e.value)}</div>
    </div>`;
  }).join('');
}

function toggleValueField() {
  const isMulti = document.getElementById('e-multiline').checked;
  document.getElementById('e-value-single').style.display = isMulti ? 'none' : '';
  document.getElementById('e-value-multi').style.display  = isMulti ? '' : 'none';
}

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function toggleEye(inputId, btn) {
  const el = document.getElementById(inputId);
  el.type  = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '👁' : '🙈';
}

let _toastMsg = '';
let _toastErr = false;
function toast(msg, isError) {
  _toastMsg = msg; _toastErr = !!isError;
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast show' + (isError ? ' error' : '');
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function openAddModal() {
  _editId = null;
  document.getElementById('entry-modal-title').textContent = 'New Entry';
  document.getElementById('e-name').value = '';
  document.getElementById('e-value-single').value = '';
  document.getElementById('e-value-multi').value = '';
  document.getElementById('e-multiline').checked = false;
  toggleValueField();
  openModal('entry-modal');
}

function editEntry(id) {
  const e = _entries.find(x => x.id === id);
  if (!e) return;
  _editId = id;
  document.getElementById('entry-modal-title').textContent = 'Edit Entry';
  document.getElementById('e-name').value = e.name;
  document.getElementById('e-multiline').checked = !!e.multiline;
  toggleValueField();
  if (e.multiline) document.getElementById('e-value-multi').value = e.value;
  else             document.getElementById('e-value-single').value = e.value;
  openModal('entry-modal');
}

async function saveEntry() {
  const name    = document.getElementById('e-name').value.trim();
  const isMulti = document.getElementById('e-multiline').checked;
  const value   = isMulti
    ? document.getElementById('e-value-multi').value
    : document.getElementById('e-value-single').value.trim();
  if (!name)  { toast('Name is required', true); return; }
  if (!value) { toast('Value is required', true); return; }
  if (_editId) {
    const idx = _entries.findIndex(x => x.id === _editId);
    if (idx !== -1) _entries[idx] = { ..._entries[idx], name, value, multiline: isMulti };
  } else {
    _entries.push({ id: crypto.randomUUID(), name, value, multiline: isMulti, created: Date.now() });
  }
  await saveVault();
  closeModal('entry-modal');
  renderEntries();
  toast(_editId ? 'Entry updated' : 'Entry saved');
}

async function deleteEntry(id) {
  _entries = _entries.filter(x => x.id !== id);
  _revealed.delete(id);
  await saveVault();
  renderEntries();
  toast('Entry deleted');
}

function toggleReveal(id) {
  _revealed.has(id) ? _revealed.delete(id) : _revealed.add(id);
  renderEntries();
  setTimeout(() => {
    const card = document.querySelector(`.entry-card[data-id="${id}"]`);
    if (card) card.classList.add('open');
  }, 10);
}

function exportVault() {
  const blob = localStorage.getItem(VAULT_KEY);
  const salt = localStorage.getItem(SALT_KEY);
  if (!blob) { toast('Nothing to export', true); return null; }
  return JSON.stringify({ blob, salt, version: 1 });
}

/* ════════════════════════════════════════════════════════════════
   TEST HELPERS
════════════════════════════════════════════════════════════════ */
function resetState() {
  localStorage.clear();
  sessionStorage.clear();
  _key = null; _entries = []; _editId = null; _revealed = new Set();
  document.querySelectorAll('#app-dom input, #app-dom textarea')
    .forEach(el => { if (el.type === 'checkbox') el.checked = false; else el.value = ''; });
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-setup').classList.add('active');
  document.getElementById('entry-modal').classList.remove('open');
  document.getElementById('settings-modal').classList.remove('open');
  _toastMsg = ''; _toastErr = false;
}

async function makeVault(pw = 'correcthorse123!') {
  document.getElementById('setup-pw').value  = pw;
  document.getElementById('setup-pw2').value = pw;
  await setupVault();
}

async function addEntry(name, value, multiline = false) {
  document.getElementById('e-name').value = name;
  document.getElementById('e-multiline').checked = multiline;
  toggleValueField();
  if (multiline) document.getElementById('e-value-multi').value = value;
  else           document.getElementById('e-value-single').value = value;
  _editId = null;
  await saveEntry();
}

/* ════════════════════════════════════════════════════════════════
   SUITES
════════════════════════════════════════════════════════════════ */

// ── 1. Crypto Layer ────────────────────────────────────────────
describe('Crypto: deriveKey', () => {
  it('returns an extractable AES-GCM-256 CryptoKey', async () => {
    const salt = crypto.getRandomValues(new Uint8Array(32));
    const key  = await deriveKey('testpassword1234', salt);
    assertEqual(key.type, 'secret');
    assertEqual(key.algorithm.name, 'AES-GCM');
    assertEqual(key.algorithm.length, 256);
    assertEqual(key.extractable, true);
  });

  it('same password + same salt produces a functionally equal key', async () => {
    const salt = crypto.getRandomValues(new Uint8Array(32));
    const k1   = await deriveKey('mypassword12345!', salt);
    const k2   = await deriveKey('mypassword12345!', salt);
    const ct   = await encrypt({ check: 1 }, k1);
    assertDeepEqual(await decrypt(ct, k2), { check: 1 });
  });

  it('different passwords produce keys that cannot cross-decrypt', async () => {
    const salt = crypto.getRandomValues(new Uint8Array(32));
    const k1   = await deriveKey('password-alpha-1', salt);
    const k2   = await deriveKey('password-beta--1', salt);
    await assertRejects(() => decrypt(await encrypt({ x: 1 }, k1), k2));
  });

  it('different salts produce keys that cannot cross-decrypt', async () => {
    const k1 = await deriveKey('sharedpassword!1', crypto.getRandomValues(new Uint8Array(32)));
    const k2 = await deriveKey('sharedpassword!1', crypto.getRandomValues(new Uint8Array(32)));
    await assertRejects(() => decrypt(await encrypt({ x: 1 }, k1), k2));
  });
});

describe('Crypto: encrypt / decrypt', () => {
  it('roundtrip: simple object', async () => {
    const key     = await deriveKey('roundtriptest123', crypto.getRandomValues(new Uint8Array(32)));
    const payload = { entries: [{ id: '1', name: 'Gmail', value: 'hunter2' }] };
    assertDeepEqual(await decrypt(await encrypt(payload, key), key), payload);
  });

  it('roundtrip: empty entries array', async () => {
    const key = await deriveKey('emptytest12345!1', crypto.getRandomValues(new Uint8Array(32)));
    assertDeepEqual(await decrypt(await encrypt({ entries: [] }, key), key), { entries: [] });
  });

  it('roundtrip: unicode + emoji', async () => {
    const key     = await deriveKey('unicodetest12345', crypto.getRandomValues(new Uint8Array(32)));
    const payload = { entries: [{ name: '日本語 🔐', value: 'パスワード' }] };
    assertDeepEqual(await decrypt(await encrypt(payload, key), key), payload);
  });

  it('roundtrip: multi-line SSH key value', async () => {
    const key     = await deriveKey('sshkeytest12345!', crypto.getRandomValues(new Uint8Array(32)));
    const payload = { entries: [{ name: 'SSH Key', value: '-----BEGIN RSA-----\nABC123\n-----END RSA-----', multiline: true }] };
    assertDeepEqual(await decrypt(await encrypt(payload, key), key), payload);
  });

  it('each call produces unique ciphertext (random IV)', async () => {
    const key = await deriveKey('ivtest12345678!1', crypto.getRandomValues(new Uint8Array(32)));
    const ct1 = await encrypt({ x: 1 }, key);
    const ct2 = await encrypt({ x: 1 }, key);
    assertOk(ct1 !== ct2, 'IVs must be random — ciphertexts should differ');
  });

  it('tampered ciphertext is rejected', async () => {
    const key   = await deriveKey('tampertest12345!', crypto.getRandomValues(new Uint8Array(32)));
    const ct    = await encrypt({ x: 1 }, key);
    const bytes = Uint8Array.from(atob(ct), c => c.charCodeAt(0));
    bytes[bytes.length - 1] ^= 0xff;
    await assertRejects(() => decrypt(btoa(String.fromCharCode(...bytes)), key));
  });
});

describe('Crypto: getSalt', () => {
  it('creates and stores a 32-byte salt when none exists', () => {
    resetState();
    const s = getSalt();
    assertEqual(s.byteLength, 32);
    assertOk(localStorage.getItem(SALT_KEY), 'salt should be persisted');
  });

  it('returns the same salt on subsequent calls', () => {
    resetState();
    const s1 = getSalt();
    const s2 = getSalt();
    assertEqual(btoa(String.fromCharCode(...s1)), btoa(String.fromCharCode(...s2)));
  });

  it('generates a new salt after storage is cleared', () => {
    resetState();
    const s1 = getSalt();
    localStorage.removeItem(SALT_KEY);
    const s2 = getSalt();
    // Two 32-byte random arrays should almost certainly differ
    assertOk(btoa(String.fromCharCode(...s1)) !== btoa(String.fromCharCode(...s2)),
      'Fresh salt should differ from previous');
  });
});

// ── 2. Vault Lifecycle ─────────────────────────────────────────
describe('Vault: setupVault', () => {
  it('rejects passwords shorter than 10 characters', async () => {
    resetState();
    document.getElementById('setup-pw').value  = 'short';
    document.getElementById('setup-pw2').value = 'short';
    await setupVault();
    assertOk(_toastErr, 'should show error toast');
    assertIncludes(_toastMsg, 'at least 10');
    assertFalsy(localStorage.getItem(VAULT_KEY), 'vault should not be created');
  });

  it('rejects mismatched passwords', async () => {
    resetState();
    document.getElementById('setup-pw').value  = 'password12345!';
    document.getElementById('setup-pw2').value = 'password99999!';
    await setupVault();
    assertOk(_toastErr);
    assertIncludes(_toastMsg, 'do not match');
    assertFalsy(localStorage.getItem(VAULT_KEY));
  });

  it('creates an encrypted vault in localStorage', async () => {
    resetState();
    await makeVault();
    assertOk(localStorage.getItem(VAULT_KEY), 'vault_data should be set');
    assertOk(localStorage.getItem(SALT_KEY),  'vault_salt should be set');
  });

  it('transitions to app screen on success', async () => {
    resetState();
    await makeVault();
    assertOk(document.getElementById('screen-app').classList.contains('active'));
  });

  it('sets _key in memory', async () => {
    resetState();
    await makeVault();
    assertOk(_key !== null, '_key should be set in memory');
  });

  it('initialises with empty entries', async () => {
    resetState();
    await makeVault();
    assertEqual(_entries.length, 0);
  });

  it('stores raw vault content that is not plaintext-readable', async () => {
    resetState();
    await makeVault('supersecret1234!');
    const blob = localStorage.getItem(VAULT_KEY);
    assertOk(!blob.includes('entries'), 'plaintext "entries" must not appear in ciphertext blob');
  });
});

describe('Vault: unlock', () => {
  it('unlocks with the correct password', async () => {
    resetState();
    await makeVault('correcthorse999!');
    lockApp();
    document.getElementById('lock-pw').value = 'correcthorse999!';
    await unlock();
    assertOk(_key !== null);
    assertOk(document.getElementById('screen-app').classList.contains('active'));
    assertIncludes(_toastMsg, 'Unlocked');
  });

  it('rejects a wrong password with error toast', async () => {
    resetState();
    await makeVault('correcthorse999!');
    lockApp();
    document.getElementById('lock-pw').value = 'wrongpassword!!1';
    await unlock();
    assertEqual(_key, null);
    assertIncludes(_toastMsg, 'Wrong password');
    assertOk(_toastErr);
  });

  it('rejects empty password with error toast', async () => {
    resetState();
    await makeVault();
    lockApp();
    document.getElementById('lock-pw').value = '';
    await unlock();
    assertIncludes(_toastMsg, 'Enter your master password');
    assertOk(_toastErr);
  });

  it('clears the password field on successful unlock', async () => {
    resetState();
    await makeVault('clearfieldtest1!');
    lockApp();
    document.getElementById('lock-pw').value = 'clearfieldtest1!';
    await unlock();
    assertEqual(document.getElementById('lock-pw').value, '');
  });
});

describe('Vault: lockApp', () => {
  it('clears _key and _entries from memory', async () => {
    resetState();
    await makeVault();
    await addEntry('Test', 'secret');
    lockApp();
    assertEqual(_key, null);
    assertEqual(_entries.length, 0);
  });

  it('removes session key cache', async () => {
    resetState();
    await makeVault();
    assertOk(sessionStorage.getItem('vk'), 'session key should exist after setup');
    lockApp();
    assertEqual(sessionStorage.getItem('vk'), null);
  });

  it('transitions to lock screen', async () => {
    resetState();
    await makeVault();
    lockApp();
    assertOk(document.getElementById('screen-lock').classList.contains('active'));
  });
});

// ── 3. Entry CRUD ──────────────────────────────────────────────
describe('Entries: add', () => {
  it('adds a single-line entry to _entries', async () => {
    resetState();
    await makeVault();
    await addEntry('Gmail', 'hunter2');
    assertEqual(_entries.length, 1);
    assertEqual(_entries[0].name, 'Gmail');
    assertEqual(_entries[0].value, 'hunter2');
    assertEqual(_entries[0].multiline, false);
  });

  it('adds a multi-line entry', async () => {
    resetState();
    await makeVault();
    await addEntry('SSH Key', 'line1\nline2\nline3', true);
    assertEqual(_entries[0].value, 'line1\nline2\nline3');
    assertEqual(_entries[0].multiline, true);
  });

  it('assigns a unique id to each entry', async () => {
    resetState();
    await makeVault();

// ── 4. Vault persistence roundtrip ────────────────────────────
describe('Vault: persistence roundtrip', () => {
  it('entries survive a lock → unlock cycle', async () => {
    resetState();
    const pw = 'roundtrip1234567';
    await makeVault(pw);
    await addEntry('GitHub', 'ghp_token123');
    await addEntry('AWS', 'AKIA1234567890');
    lockApp();
    document.getElementById('lock-pw').value = pw;
    await unlock();
    assertEqual(_entries.length, 2);
    assertEqual(_entries[0].name, 'GitHub');
    assertEqual(_entries[1].name, 'AWS');
  });

  it('multiple entries round-trip with correct values', async () => {
    resetState();
    const pw = 'multientry12345!';
    await makeVault(pw);
    const entries = [
      { name: 'Twitter', value: 'tw_pass!@#$' },
      { name: 'SSH Key', value: '---BEGIN---\nabc\n---END---', multiline: true },
      { name: 'PIN',     value: '4242' },
    ];
    for (const e of entries) await addEntry(e.name, e.value, e.multiline || false);
    lockApp();
    document.getElementById('lock-pw').value = pw;
    await unlock();
    assertEqual(_entries.length, 3);
    entries.forEach((e, i) => {
      assertEqual(_entries[i].name,  e.name);
      assertEqual(_entries[i].value, e.value);
    });
  });
});

describe('Boot: initial screen routing', () => {
  it('shows setup screen when no vault exists', () => {
    resetState();
    // Boot logic inline
    const hasVault = !!localStorage.getItem(VAULT_KEY);
    if (!hasVault) show('screen-setup');
    assertOk(document.getElementById('screen-setup').classList.contains('active'));
  });

  it('shows lock screen when vault exists but no session key', async () => {
    resetState();
    await makeVault();
    sessionStorage.removeItem('vk'); // simulate new tab session
    // Boot logic inline
    const hasVault = !!localStorage.getItem(VAULT_KEY);
    const sessionRaw = sessionStorage.getItem('vk');
    if (hasVault && !sessionRaw) show('screen-lock');
    assertOk(document.getElementById('screen-lock').classList.contains('active'));
  });

  it('auto-unlocks when session key is cached', async () => {
    resetState();
    const pw = 'sessioncache123!';
    await makeVault(pw);
    // sessionStorage should have 'vk' at this point
    assertOk(sessionStorage.getItem('vk'), 'session key should be cached after setup');
    // Simulate boot with session key present
    const sessionRaw = sessionStorage.getItem('vk');
    let autoUnlocked = false;
    if (sessionRaw) {
      try {
        const raw = Uint8Array.from(atob(sessionRaw), c => c.charCodeAt(0));
        _key      = await crypto.subtle.importKey('raw', raw, { name:'AES-GCM', length:256 }, true, ['encrypt','decrypt']);
        const blob = localStorage.getItem(VAULT_KEY);
        _entries  = (await decrypt(blob, _key)).entries || [];
        autoUnlocked = true;
      } catch { sessionStorage.removeItem('vk'); }
    }
    assertOk(autoUnlocked, 'should auto-unlock from session key');
    assertOk(_key !== null);
  });
});

/* ════════════════════════════════════════════════════════════════
   RUN ALL TESTS + RENDER RESULTS
════════════════════════════════════════════════════════════════ */
(async function runAll() {
  const resultsEl = document.getElementById('results');
  const summaryEl = document.getElementById('summary');
  let totalPass = 0, totalFail = 0;

  for (const suite of suites) {
    const suiteEl = document.createElement('div');
    suiteEl.className = 'suite';
    suiteEl.innerHTML = `<div class="suite-name">${suite.name}</div>`;
    resultsEl.appendChild(suiteEl);

    for (const t of suite.tests) {
      let pass = false, errMsg = '';
      try {
        await t.fn();
        pass = true; totalPass++;
      } catch(e) {
        pass = false; totalFail++;
        errMsg = e.message || String(e);
      }

      const row = document.createElement('div');
      row.className = 'test';
      row.innerHTML = `
        <span class="badge ${pass ? 'pass' : 'fail'}">${pass ? 'PASS' : 'FAIL'}</span>
        <span class="test-name">${t.name}${errMsg ? `<div class="test-err">${errMsg}</div>` : ''}</span>`;
      suiteEl.appendChild(row);
    }
  }

  const total = totalPass + totalFail;
  summaryEl.className = `summary ${totalFail === 0 ? 'all-pass' : 'has-fail'}`;
  summaryEl.textContent =
    totalFail === 0
      ? `✅  All ${total} tests passed`
      : `❌  ${totalFail} of ${total} tests failed  (${totalPass} passed)`;

  console.log(`[Sovereign Tests] ${totalPass}/${total} passed${totalFail ? ` — ${totalFail} FAILED` : ''}`);
  // Signal completion for Marionette polling
  summaryEl.setAttribute('data-done', '1');
  document.title = `Tests done: ${totalPass}/${total} passed`;
})();
